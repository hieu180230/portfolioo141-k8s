apiVersion: apps/v1
kind: Deployment
metadata: 
  name: p-deployment-be
  namespace: portfolio-backend
  labels:
    app: portfolioo141-be
spec:
  replicas: {{ .Values.backend.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: portfolioo141-be
  template:
    metadata:
      labels: 
        app: portfolioo141-be
    spec:
      containers:
        - name: portfolioo141-be
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: MONGO_DB
          #resources restriction
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          #health check
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10