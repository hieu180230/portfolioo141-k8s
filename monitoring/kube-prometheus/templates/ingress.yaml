apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-ingressroute
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.domain }}`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
