kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 5d
      retentionSize: "5GB"
      resources:
        requests:
          memory: 1Gi
          cpu: 500m
        limits:
          memory: 2Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path 
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 8Gi
      # Scrape all ServiceMonitors across namespaces
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false

  grafana:
    adminPassword: "admin"
    persistence:
      enabled: true
      storageClassName: local-path
      size: 1Gi
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default

  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi

ingress:
  domain: "monitor.nnhieu.duckdns.org"