apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # The Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory
    # Put your actual email address here (they email you if the cert is failing to renew)
    email: hieu180230@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
    - http01:
        ingress:
          class: traefik